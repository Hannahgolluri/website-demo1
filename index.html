<!DOCTYPE HTML>
<html>
<head>
    <title>Hannah Moses | Cloud Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f19;
            color: white;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 50px;
        }

        .card {
            background: #111827;
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card h2 {
            margin: 0;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
        }

        .modal-content {
            background: #111827;
            margin: 10% auto;
            padding: 30px;
            width: 60%;
            border-radius: 15px;
        }

        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1 style="text-align:center; margin-top:40px;">
    Designing Systems That Think
</h1>

<div class="container">

    <div class="card" onclick="openModal('system')">
        <h2>How I Think About Systems</h2>
    </div>

    <div class="card" onclick="openModal('cloud')">
        <h2>Cloud Migration</h2>
    </div>

    <div class="card" onclick="openModal('data')">
        <h2>Data Optimization</h2>
    </div>

    <div class="card" onclick="openModal('design')">
        <h2>End-to-End Cloud Design</h2>
    </div>

</div>

<!-- MODALS -->

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-text"></div>
    </div>
</div>

<script>
function openModal(type) {
    let content = "";

    if (type === "system") {
        content = `
        <h2>How I Think About Systems</h2>
        <p>I don’t start with tools — I start with understanding the system.</p>
        <p>I analyze how data flows, where failures can happen, and how systems scale.</p>
        <p>My goal is to build systems that stay simple, reliable, and efficient.</p>`;
    }

    if (type === "cloud") {
        content = `
        <h2>Cloud Migration</h2>
        <p>Migration is not just moving systems — it's redesigning them for scalability.</p>
        <p>I focus on minimizing downtime and ensuring a smooth transition.</p>
        <p>The goal is better performance and flexibility in the cloud.</p>`;
    }

    if (type === "data") {
        content = `
        <h2>Data Optimization</h2>
        <p>I improve database performance using indexing and query optimization.</p>
        <p>I focus on faster response times and efficient data handling.</p>
        <p>Systems should scale without slowing down.</p>`;
    }

    if (type === "design") {
        content = `
        <h2>End-to-End Cloud Design</h2>
        <p>I design complete cloud systems from data ingestion to delivery.</p>
        <p>Each layer is built for reliability, monitoring, and scalability.</p>
        <p>Everything works together as one system.</p>`;
    }

    document.getElementById("modal-text").innerHTML = content;
    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
